# Standalone Munin stack. Spin up with:
#
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# Three containers — all sit on the default compose network. Munin binds
# only to 127.0.0.1:8090 by default; front it with your own nginx/Caddy
# for public access (see docs/nginx.example.conf).

services:
  munin-redis:
    image: redis:7-alpine
    # Hard memory cap is the whole point — bounded buffer vs unbounded leak.
    command:
      [
        "redis-server",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--save",
        "",
      ]
    volumes:
      - munin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  munin-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: munin
      POSTGRES_USER: munin
      POSTGRES_PASSWORD: ${MUNIN_DB_PASSWORD:?MUNIN_DB_PASSWORD required in .env}
    volumes:
      - munin_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U munin -d munin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  munin:
    build:
      context: .
      dockerfile: Dockerfile
    # Default binds only to localhost so the public surface is yours to
    # decide via reverse proxy. Override MUNIN_HOST_PORT to expose elsewhere.
    ports:
      - "${MUNIN_HOST_PORT:-127.0.0.1:8090}:8090"
    environment:
      MUNIN_HTTP_ADDR: ":8090"
      MUNIN_REDIS_URL: redis://munin-redis:6379/0
      MUNIN_POSTGRES_DSN: postgres://munin:${MUNIN_DB_PASSWORD:?}@munin-db:5432/munin?sslmode=disable
      MUNIN_ALLOWED_SITES: ${MUNIN_ALLOWED_SITES:?MUNIN_ALLOWED_SITES required (comma-separated site ids)}
      MUNIN_SITE_ORIGINS: ${MUNIN_SITE_ORIGINS:-}
      MUNIN_DASHBOARD_TOKEN: ${MUNIN_DASHBOARD_TOKEN:?MUNIN_DASHBOARD_TOKEN required (shared bearer for /api/*)}
      MUNIN_FLUSH_INTERVAL: ${MUNIN_FLUSH_INTERVAL:-60s}
      MUNIN_FLUSH_BATCH_SIZE: ${MUNIN_FLUSH_BATCH_SIZE:-500}
      MUNIN_ROLLUP_INTERVAL: ${MUNIN_ROLLUP_INTERVAL:-15m}
    healthcheck:
      test: ["CMD", "/munin", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      munin-redis:
        condition: service_healthy
      munin-db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  munin_redis_data:
  munin_db_data:
