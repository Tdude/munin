# nginx vhost example for first-party Munin tracking.
#
# Replace `your-domain.com` and adjust the SSL paths / upstream block to
# match your setup. The key piece is the `location /munin/` block — drop
# that into your existing vhost and reload nginx.

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # Adjust these to your cert paths
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Common proxy headers (used by /munin/ and your app)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Munin first-party tracker + dashboard API ──────────────────
    # The trailing slash on proxy_pass strips /munin/ so the container sees
    # /script.js, /collect, /api/*.
    location /munin/ {
        proxy_pass http://127.0.0.1:8090/;
    }

    # ── Your application ───────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;     # or wherever your app listens
    }
}
